<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bedtime" />
    <meta name="theme-color" content="#1a0a2e" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="assets/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png" />
    <!-- Fonts: only weights 600 & 700 are used in the app -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" />
    <!-- Preload guide characters (every screen) and frames (every task screen) -->
    <link rel="preload" as="image" href="assets/princess-character.webp" />
    <link rel="preload" as="image" href="assets/mermaid-character.webp" />
    <link rel="preload" as="image" href="assets/princess-frame.webp" />
    <link rel="preload" as="image" href="assets/mermaid-frame.webp" />
    <title>Harper's Bedtime Adventure</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
      html { width: 100%; height: 100%; min-height: calc(100% + env(safe-area-inset-top)); overflow: hidden; background: #1a0a2e; }
      body { width: 100%; height: 100%; overflow: hidden; background: #1a0a2e; }
      #root { width: 100%; height: 100%; }

      @keyframes floatUp {
        0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
        15%  { opacity: 0.8; }
        85%  { opacity: 0.8; }
        100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
      }
      @keyframes floatUpSlow {
        0%   { transform: translateY(0) scale(1); opacity: 0; }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.4; }
        100% { transform: translateY(-110vh) scale(0.6); opacity: 0; }
      }
      @keyframes fallDown {
        0%   { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(40px); opacity: 0; }
      }
      @keyframes floatGentle {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.06); }
      }
      @keyframes softPulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.6; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes countPop {
        0%   { transform: scale(0.3); opacity: 0; }
        50%  { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes gemPop {
        0%   { transform: scale(0); opacity: 0; }
        50%  { transform: scale(1.25); opacity: 1; }
        75%  { transform: scale(0.9); }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes gemGlow {
        0%, 100% { filter: brightness(1) drop-shadow(0 0 3px currentColor); }
        50%      { filter: brightness(1.2) drop-shadow(0 0 8px currentColor); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes crossfadeIn {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; transform: scale(0.8); }
        50%      { opacity: 1;   transform: scale(1.2); }
      }
      @keyframes bubbleRise {
        0%   { transform: translateY(0)     translateX(0)   scale(1);   opacity: 0.3; }
        25%  { transform: translateY(-25vh) translateX(8px) scale(0.9); opacity: 0.5; }
        50%  { transform: translateY(-50vh) translateX(-5px) scale(0.8); opacity: 0.4; }
        75%  { transform: translateY(-75vh) translateX(6px) scale(0.7); opacity: 0.3; }
        100% { transform: translateY(-100vh) translateX(-3px) scale(0.5); opacity: 0; }
      }
      @keyframes victoryTwirl {
        0%   { transform: rotateY(0deg)    scale(1); }
        60%  { transform: rotateY(1080deg) scale(1); }
        75%  { transform: rotateY(1080deg) scale(1.18); }
        88%  { transform: rotateY(1080deg) scale(0.95); }
        100% { transform: rotateY(1080deg) scale(1); }
      }
      @keyframes victoryBurst {
        0%   { opacity: 0;   transform: scale(0.3); }
        25%  { opacity: 0;   transform: scale(0.3); }
        38%  { opacity: 1;   transform: scale(1.2); }
        55%  { opacity: 0.8; transform: scale(2); }
        75%  { opacity: 0.3; transform: scale(2.8); }
        100% { opacity: 0;   transform: scale(3.2); }
      }
      @keyframes sleepDrift {
        0%   { transform: translateY(-20px) scale(1.05); opacity: 0; }
        60%  { transform: translateY(5px)   scale(0.98); opacity: 0.8; }
        100% { transform: translateY(0)     scale(1);    opacity: 1; }
      }

      .safe-top    { padding-top:    env(safe-area-inset-top,    0px); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }

      /* Respect iOS Reduce Motion accessibility setting.
         Continuous ambient loops stop; one-shot reward animations complete instantly. */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration:        0.01ms !important;
          animation-iteration-count: 1      !important;
          transition-duration:       0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
